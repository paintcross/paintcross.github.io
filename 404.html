<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found — Paint.Cross</title>
  <link rel="icon" type="image/png" href="/icon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0c0c0e;
      --card:      #1a1a24;
      --border:    #2a2a3a;
      --accent:    #5b8def;
      --accent2:   #9b6ef7;
      --text:      #f0f0f5;
      --muted:     #7c7c9a;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex; align-items: center;
      padding: 0 48px; height: 60px;
      background: rgba(12,12,14,0.85);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .nav-logo img { width: 26px; height: 26px; border-radius: 6px; }
    .nav-logo span { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -.3px; }

    main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center;
      padding: 60px 24px;
      position: relative;
      overflow: hidden;
    }
    main::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% -10%,
        rgba(91,141,239,.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .code {
      font-size: clamp(72px, 14vw, 120px);
      font-weight: 800;
      letter-spacing: -3px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    h1 {
      font-size: clamp(22px, 4vw, 30px);
      font-weight: 800;
      letter-spacing: -.5px;
      margin-bottom: 12px;
    }
    p {
      color: var(--muted);
      font-size: 15px;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .actions { display: flex; gap: 14px; flex-wrap: wrap; justify-content: center; }
    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 26px; background: var(--accent); border: none;
      border-radius: 10px; color: #fff; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: opacity .2s, transform .2s;
    }
    .btn-primary:hover { opacity: .88; transform: translateY(-1px); }
    .btn-secondary {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 13px 22px; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-size: 14px;
      text-decoration: none; transition: border-color .2s, transform .2s;
    }
    .btn-secondary:hover { border-color: var(--accent); transform: translateY(-1px); }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">
    <img src="/icon.png" alt="Paint.Cross icon" />
    <span>Paint.Cross</span>
  </a>
</nav>

<main>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has moved. The canvas is blank here.</p>
  <div class="actions">
    <a class="btn-primary" href="https://paintcross.github.io/">Back to home</a>
    <a class="btn-secondary" href="https://github.com/paintcross/PaintCross/releases" rel="noopener">GitHub releases</a>
  </div>
</main>

</body>
</html>
